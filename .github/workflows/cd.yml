name: Release Frontend

on:
  push:
    branches:
      - main
  pull_request:

env:
  NODE_VERSION: 24.11.0
  AWS_REGION: eu-central-1
  KEEP: 3

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug
        run: echo "Role ARN = arn:aws:iam::${{ vars.USER_ID }}:role/github-actions-ecs-ecr-role"

      - name: Debug OIDC token
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com")
          PAYLOAD=$(echo $TOKEN | python3 -c "import sys,json,base64; t=json.load(sys.stdin)['value'].split('.')[1]; p=t+'='*(4-len(t)%4); print(json.dumps(json.loads(base64.b64decode(p)),indent=2))")
          echo "$PAYLOAD"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.USER_ID }}:role/github-actions-ecs-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Test S3
        run: aws s3 ls
