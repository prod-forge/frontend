name: Release Frontend

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: 24.11.0
  AWS_REGION: eu-central-1
  KEEP: ${{ vars.KEEP || 10 }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:web-client
        env:
          VITE_ASSETS_BASE_URL: ${{ vars.CLOUDFRONT_URL }}/assets

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.USER_ID }}:role/github-actions-ecs-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy assets
        run: |
          aws s3 sync ./assets \
            s3://${{ vars.S3_ASSETS_BUCKET }}/ \
            --cache-control "max-age=31536000,immutable"

      - name: Deploy versioned archive
        run: |
          aws s3 sync apps/web-client/dist \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/${{ github.ref_name }}/ \
            --delete

      - name: Deploy to root (active version)
        run: |
          aws s3 sync apps/web-client/dist \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/ \
            --exclude "releases/*" \
            --delete \
            --cache-control "max-age=31536000,immutable"
          aws s3 cp apps/web-client/dist/index.html \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Cleanup old versions
        run: |
          VERSIONS=$(aws s3 ls s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/ \
            --delimiter / | awk '{print $2}' | sort -V)
          COUNT=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          if [ "$COUNT" -gt ${{ env.KEEP }} ]; then
            echo "$VERSIONS" | head -n $(($COUNT - ${{ env.KEEP }})) | while read v; do
              aws s3 rm s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/$v --recursive
            done
          fi
