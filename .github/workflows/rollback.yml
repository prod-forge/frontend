name: Rollback Frontend

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g. v1.0.0)'
        required: true
        type: string

env:
  AWS_REGION: eu-central-1

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.USER_ID }}:role/github-actions-ecs-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify version exists
        run: |
          aws s3 ls s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/${{ inputs.version }}/ || \
            (echo "Version ${{ inputs.version }} not found in releases" && exit 1)

      - name: Restore version from archive
        run: |
          aws s3 sync \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/${{ inputs.version }}/ \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/ \
            --exclude "releases/*" \
            --delete \
            --cache-control "max-age=31536000,immutable"
          aws s3 cp \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/releases/${{ inputs.version }}/index.html \
            s3://${{ vars.S3_WEB_CLIENT_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
